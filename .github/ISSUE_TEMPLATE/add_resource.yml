name: Add Resource
description: Suggest a new resource to add
labels: ["new-resource"]
body:
  - type: input
    id: name
    attributes:
      label: Resource Name
      placeholder: e.g. PicoCTF
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      placeholder: https://
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: Category
      placeholder: e.g. ctfs
    validations:
      required: true
  - type: input
    id: type
    attributes:
      label: Type
      description: Optional, except for Experience categories (hackathons, ctfs, game-jams, competitions) which must use `event`. Use only a type allowed for the category; see docs/SCHEMA.md.
      placeholder: e.g. course
    validations:
      required: false
  - type: input
    id: location
    attributes:
      label: Location
      description: Optional. Use Online or City, Province when the location is known; leave blank if unknown.
      placeholder: e.g. Montreal, Quebec
    validations:
      required: false
  - type: input
    id: month
    attributes:
      label: Month
      description: Optional. Use only when the resource has a clear recurring or seasonal month.
      placeholder: e.g. January
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: One sentence ending with a period.
    validations:
      required: true

