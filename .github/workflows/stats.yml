name: Stats

on:
  pull_request:
    branches: [main]

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run stats script
        id: stats_script
        continue-on-error: true
        run: python scripts/stats.py
      - name: Write stats summary
        if: always()
        run: |
          stats="FAIL"
          if [ "${{ steps.stats_script.outcome }}" = "success" ]; then stats="PASS"; fi
          {
            echo "## Dataset stats"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Stats script | $stats |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if stats are not healthy
        if: always()
        run: |
          if [ "${{ steps.stats_script.outcome }}" != "success" ]; then
            exit 1
          fi
