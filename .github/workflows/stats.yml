name: Stats

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Run stats script
        id: stats_script
        continue-on-error: true
        run: python scripts/stats.py
      - name: Write stats summary
        if: always()
        run: |
          stats="FAIL"
          if [ "${{ steps.stats_script.outcome }}" = "success" ]; then stats="PASS"; fi
          {
            echo "## Dataset stats"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Stats script | $stats |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if stats are not healthy
        if: always()
        run: |
          if [ "${{ steps.stats_script.outcome }}" != "success" ]; then
            exit 1
          fi
