name: Generated Outputs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generated-outputs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install locked Python dependencies
        run: |
          python -m pip install uv==0.11.28
          uv sync --frozen
      - name: Regenerate resource exports
        id: resource_exports
        continue-on-error: true
        run: |
          uv run python scripts/sort_resources.py
          uv run python scripts/generate_readme.py
          uv run python scripts/generate_citation.py
          uv run python scripts/generate_sitemap.py
          uv run python scripts/generate_feed.py
          uv run python scripts/generate_og_image.py
          uv run python scripts/generate_schema_docs.py
          uv run python scripts/generate_combined.py
          uv run python scripts/generate_site_json.py
          uv run python scripts/generate_stats_json.py
          uv run python scripts/export_csv.py
      - name: Regenerate EDA report
        id: eda_report
        continue-on-error: true
        run: uv run python scripts/generate_eda_report.py
      - name: Check generated outputs are current
        id: freshness
        continue-on-error: true
        run: git diff --exit-code -- data README.md docs/SCHEMA.md CITATION.cff generated public ':!public/og.png' ':!generated/eda'
      - name: Write generated outputs summary
        if: always()
        run: |
          exports="FAIL"
          eda="FAIL"
          freshness="FAIL"
          if [ "${{ steps.resource_exports.outcome }}" = "success" ]; then exports="PASS"; fi
          if [ "${{ steps.eda_report.outcome }}" = "success" ]; then eda="PASS"; fi
          if [ "${{ steps.freshness.outcome }}" = "success" ]; then freshness="PASS"; fi
          {
            echo "## Generated outputs"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Resource sorting and exports | $exports |"
            echo "| EDA report generation | $eda |"
            echo "| Generated files committed | $freshness |"
            if [ "$freshness" = "FAIL" ]; then
              echo ""
              echo "### Files needing regeneration"
              echo ""
              echo '```text'
              git status --short -- data README.md docs/SCHEMA.md CITATION.cff generated public ':!public/og.png'
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if generated outputs are not healthy
        if: always()
        run: |
          if [ "${{ steps.resource_exports.outcome }}" != "success" ] || [ "${{ steps.eda_report.outcome }}" != "success" ] || [ "${{ steps.freshness.outcome }}" != "success" ]; then
            exit 1
          fi
