name: Generate

on:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install jsonschema requests
      - run: python scripts/generate_readme.py
      - run: python scripts/generate_combined.py
      - run: python scripts/generate_site_json.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md generated/
          git diff --staged --quiet || git commit -m "chore: regenerate outputs [skip ci]"
          git push
