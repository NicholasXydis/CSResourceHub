name: Check Favicons

on:
  schedule:
    - cron: "0 9 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-favicons:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install locked Python dependencies
        run: |
          python -m pip install uv==0.11.28
          uv sync --frozen
      - name: Probe resource favicons
        id: favicons
        continue-on-error: true
        run: uv run python scripts/check_favicons.py
      - name: Create favicon list update PR
        id: update_pr
        if: steps.favicons.outcome == 'success'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: "chore: update missing favicon domains"
          title: "chore: update missing favicon domains"
          body: "Automated update of generated/favicons.json after probing resource domains."
          branch: chore/update-missing-favicons
          delete-branch: true
          add-paths: |
            generated/favicons.json
      - name: Write favicon summary
        if: always()
        run: |
          favicons="FAIL"
          pr="FAIL"
          if [ "${{ steps.favicons.outcome }}" = "success" ]; then favicons="PASS"; fi
          if [ "$favicons" = "PASS" ] && [ "${{ steps.update_pr.outcome }}" != "failure" ]; then pr="PASS"; fi
          {
            echo "## Favicon health"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Domain favicon probe | $favicons |"
            echo "| Favicon list PR | $pr |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if the favicon probe is not healthy
        if: always()
        run: |
          if [ "${{ steps.favicons.outcome }}" != "success" ]; then
            exit 1
          fi
