name: Welcome

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  welcome:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - uses: actions/first-interaction@a1db7729b356323c7988c20ed6f0d33fe31297be # v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            Thanks for your first contribution to CS Resource Hub! 🎉
            Please make sure you have read [CONTRIBUTING.md](https://github.com/NicholasXydis/CSResourceHub/blob/main/CONTRIBUTING.md) and run `make validate` and `make generate` or the direct commands from `docs/ADDING_RESOURCES.md` before requesting a review.
