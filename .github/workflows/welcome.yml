name: Welcome

on:
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            Thanks for your first contribution to CS Resource Hub! 🎉
            Please make sure you have read [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) and run `make validate` before requesting a review.
