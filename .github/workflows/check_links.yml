name: Check Links

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install requests jsonschema
      - name: Check resource links
        id: links
        continue-on-error: true
        run: python scripts/check_links.py
      - name: Regenerate exports
        id: exports
        continue-on-error: true
        run: |
          python scripts/generate_combined.py
          python scripts/generate_site_json.py
          python scripts/export_csv.py
      - name: Validate updated resources
        id: validate_resources
        continue-on-error: true
        run: python scripts/validate_all.py
      - name: Create last_verified update PR
        id: update_pr
        if: steps.links.outcome == 'success' && steps.exports.outcome == 'success' && steps.validate_resources.outcome == 'success'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: "chore: update verified link dates"
          title: "chore: update verified link dates"
          body: "Automated update of last_verified dates after successful link checks."
          branch: chore/update-verified-link-dates
          delete-branch: true
          add-paths: |
            data/
            generated/
      - name: Write link check summary
        if: always()
        run: |
          links="FAIL"
          exports="FAIL"
          validation="FAIL"
          pr="FAIL"
          if [ "${{ steps.links.outcome }}" = "success" ]; then links="PASS"; fi
          if [ "${{ steps.exports.outcome }}" = "success" ]; then exports="PASS"; fi
          if [ "${{ steps.validate_resources.outcome }}" = "success" ]; then validation="PASS"; fi
          if [ "$links" = "PASS" ] && [ "$exports" = "PASS" ] && [ "$validation" = "PASS" ] && [ "${{ steps.update_pr.outcome }}" != "failure" ]; then pr="PASS"; fi
          {
            echo "## Link health"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Resource links | $links |"
            echo "| Generated exports | $exports |"
            echo "| Dataset validation | $validation |"
            echo "| Verified-date PR | $pr |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if link checks are not healthy
        if: always()
        run: |
          if [ "${{ steps.links.outcome }}" != "success" ] || [ "${{ steps.exports.outcome }}" != "success" ] || [ "${{ steps.validate_resources.outcome }}" != "success" ]; then
            exit 1
          fi
