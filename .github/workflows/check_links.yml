name: Check Links

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install jsonschema requests
      - run: python scripts/check_links.py
      - run: python scripts/generate_combined.py
      - run: python scripts/generate_site_json.py
      - run: python scripts/export_csv.py
      - name: Create last_verified update PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update verified link dates"
          title: "chore: update verified link dates"
          body: "Automated update of last_verified dates after successful link checks."
          branch: chore/update-verified-link-dates
          delete-branch: true
          add-paths: |
            data/
            generated/