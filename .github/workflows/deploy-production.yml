name: Deploy Production

on:
  workflow_run:
    workflows: [Validate]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - id: resolve
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install locked Python dependencies
        run: |
          python -m pip install uv==0.11.28
          uv sync --frozen --extra dev
      - name: Ruff
        run: uv run ruff check scripts/ tests/ notebooks/
      - name: Python tests
        run: uv run pytest tests/
      - name: Validate the dataset
        run: uv run python scripts/validate_all.py
      - name: Regenerate outputs and fail on drift
        run: |
          uv run python scripts/normalize_resources.py
          uv run python scripts/sort_resources.py
          uv run python scripts/generate_readme.py
          uv run python scripts/generate_schema_docs.py
          uv run python scripts/generate_citation.py
          uv run python scripts/generate_sitemap.py
          uv run python scripts/generate_feed.py
          uv run python scripts/generate_combined.py
          uv run python scripts/generate_site_json.py
          uv run python scripts/generate_stats_json.py
          uv run python scripts/export_csv.py
          uv run python scripts/generate_eda_report.py
          git diff --exit-code -- data README.md docs/SCHEMA.md CITATION.cff generated public
      - run: npm ci
      - name: Type check, lint, unit tests, build
        run: npm run check
      - name: Install browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run browser suite
        run: npx playwright test

  deploy:
    name: Deploy Production
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://csresourcehub.ca
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.verify.outputs.sha }}
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build site
        run: npm run build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.42.0"
          command: pages deploy dist --project-name=csresourcehub --branch=main
      - name: Install browser
        run: npx playwright install --with-deps chromium
      - name: Smoke test production
        env:
          PRODUCTION_URL: https://csresourcehub.ca
        run: npm run test:smoke:production
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-smoke-diagnostics
          path: |
            playwright-report/
            test-results/
          retention-days: 14
