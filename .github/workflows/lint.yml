name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.14"
      - run: pip install ruff
      - run: ruff check scripts/
      - run: python scripts/lint_json.py
