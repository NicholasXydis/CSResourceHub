name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check scripts/
      - run: python scripts/lint_json.py
      - name: Write lint summary
        if: success()
        run: |
          {
            echo "## Lint"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Python style with Ruff | Passed |"
            echo "| JSON formatting | Passed |"
          } >> "$GITHUB_STEP_SUMMARY"
