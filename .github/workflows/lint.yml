name: Lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Run Ruff
        id: ruff
        continue-on-error: true
        run: ruff check scripts/
      - name: Check JSON formatting
        id: json_format
        continue-on-error: true
        run: python scripts/lint_json.py
      - name: Write lint summary
        if: always()
        run: |
          ruff="FAIL"
          json="FAIL"
          if [ "${{ steps.ruff.outcome }}" = "success" ]; then ruff="PASS"; fi
          if [ "${{ steps.json_format.outcome }}" = "success" ]; then json="PASS"; fi
          {
            echo "## Lint"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Python style with Ruff | $ruff |"
            echo "| JSON formatting | $json |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if lint is not healthy
        if: always()
        run: |
          if [ "${{ steps.ruff.outcome }}" != "success" ] || [ "${{ steps.json_format.outcome }}" != "success" ]; then
            exit 1
          fi
