name: PR Size

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pr-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Check PR size
        run: |
          FILES=$(git diff --name-only origin/main...HEAD | grep "data/.*\.json" | wc -l)
          STATUS="PASS"
          if [ "$FILES" -gt 20 ]; then STATUS="FAIL"; fi
          {
            echo "## PR size"
            echo ""
            echo "| Check | Result | Details |"
            echo "| --- | --- | --- |"
            echo "| Resource JSON files changed | $STATUS | $FILES changed, maximum 20 |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$STATUS" = "FAIL" ]; then
            echo "This PR modifies $FILES resource files. Consider splitting into smaller PRs."
            exit 1
          fi
