name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.14"
      - run: pip install jsonschema
      - run: python scripts/validate_all.py
