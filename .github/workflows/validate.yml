name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - run: python scripts/validate_all.py
      - name: Write validation summary
        if: success()
        run: |
          {
            echo "## Data validation"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Schema and required fields | Passed |"
            echo "| Duplicate resources | Passed |"
            echo "| Categories and file placement | Passed |"
            echo "| Description and URL rules | Passed |"
          } >> "$GITHUB_STEP_SUMMARY"
