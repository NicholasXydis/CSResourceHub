name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 10 1 * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install locked Python dependencies
        run: |
          python -m pip install uv==0.11.28
          uv sync --frozen --extra dev
      - name: Validate resources
        id: validate_resources
        continue-on-error: true
        run: uv run python scripts/validate_all.py
      - name: Test Python pipeline
        id: python_tests
        continue-on-error: true
        run: uv run pytest
      - name: Write validation summary
        if: always()
        run: |
          validation="FAIL"
          tests="FAIL"
          if [ "${{ steps.validate_resources.outcome }}" = "success" ]; then validation="PASS"; fi
          if [ "${{ steps.python_tests.outcome }}" = "success" ]; then tests="PASS"; fi
          {
            echo "## Data validation"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Resource schema and data rules | $validation |"
            echo "| Python pipeline tests | $tests |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if validation is not healthy
        if: always()
        run: |
          if [ "${{ steps.validate_resources.outcome }}" != "success" ] || [ "${{ steps.python_tests.outcome }}" != "success" ]; then
            exit 1
          fi
