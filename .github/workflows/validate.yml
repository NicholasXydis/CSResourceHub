name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - name: Validate resources
        id: validate_resources
        continue-on-error: true
        run: python scripts/validate_all.py
      - name: Write validation summary
        if: always()
        run: |
          validation="FAIL"
          if [ "${{ steps.validate_resources.outcome }}" = "success" ]; then validation="PASS"; fi
          {
            echo "## Data validation"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Resource schema and data rules | $validation |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if validation is not healthy
        if: always()
        run: |
          if [ "${{ steps.validate_resources.outcome }}" != "success" ]; then
            exit 1
          fi
