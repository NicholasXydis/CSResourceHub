name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 13 * * 1"

permissions:
  contents: read
  security-events: write
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            label: Python
          - language: javascript-typescript
            label: TypeScript
          - language: actions
            label: Actions

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - name: Analyze ${{ matrix.label }} with CodeQL
        id: codeql_analyze
        continue-on-error: true
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: /language:${{ matrix.language }}
      - name: Write security summary
        if: always()
        run: |
          codeql="FAIL"
          if [ "${{ steps.codeql_analyze.outcome }}" = "success" ]; then codeql="PASS"; fi
          {
            echo "## Security analysis"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| CodeQL ${{ matrix.label }} analysis | $codeql |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if security analysis is not healthy
        if: always()
        run: |
          if [ "${{ steps.codeql_analyze.outcome }}" != "success" ]; then
            exit 1
          fi
