name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 13 * * 1"

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4
      - name: Write security summary
        if: success()
        run: |
          {
            echo "## Security analysis"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| CodeQL Python analysis | Completed |"
            echo "| Security alerts upload | Completed |"
          } >> "$GITHUB_STEP_SUMMARY"
