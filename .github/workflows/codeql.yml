name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 13 * * 1"

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - name: Analyze Python with CodeQL
        id: codeql_analyze
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
      - name: Write security summary
        if: always()
        run: |
          codeql="FAIL"
          if [ "${{ steps.codeql_analyze.outcome }}" = "success" ]; then codeql="PASS"; fi
          {
            echo "## Security analysis"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| CodeQL Python analysis | $codeql |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if security analysis is not healthy
        if: always()
        run: |
          if [ "${{ steps.codeql_analyze.outcome }}" != "success" ]; then
            exit 1
          fi
