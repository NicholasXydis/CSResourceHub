repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: validate-json
        name: Validate dataset
        entry: python scripts/validate_all.py
        language: python
        additional_dependencies: [jsonschema>=4.21.0]
        pass_filenames: false

      - id: frontend-format
        name: Frontend formatting (Prettier)
        entry: npm run format:check
        language: system
        pass_filenames: false
        files: ^(src/|index\.html$|vite\.config\.ts$|eslint\.config\.ts$|package\.json$|tsconfig\.json$)

      - id: frontend-lint
        name: Frontend lint (ESLint)
        entry: npm run lint
        language: system
        pass_filenames: false
        files: ^(src/|vite\.config\.ts$|eslint\.config\.ts$)

      - id: frontend-lint-css
        name: Frontend CSS lint (Stylelint)
        entry: npm run lint:css
        language: system
        pass_filenames: false
        files: ^src/.*\.css$

      - id: frontend-typecheck
        name: Frontend types (TypeScript)
        entry: npm run typecheck
        language: system
        pass_filenames: false
        files: ^(src/|generated/|vite\.config\.ts$|tsconfig\.json$)

      - id: frontend-test
        name: Frontend tests (Vitest)
        entry: npm run test
        language: system
        pass_filenames: false
        files: ^(src/|generated/|schema/)
